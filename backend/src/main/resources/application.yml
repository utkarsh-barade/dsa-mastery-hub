spring:
  datasource:
    url: jdbc:h2:mem:dsa_mastery_hub
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080

jwt:
  secret: dsamasteryhubsecretkeythatshouldbelonger
  expiration: 86400000
